<svg width="760" height="200" viewBox="0 0 760 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mcp-locator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="760" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.55" stop-color="#0f3d56"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="pin" x1="55" y1="40" x2="125" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="0" y="0" width="760" height="200" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="758" height="198" rx="25" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- location pin -->
  <g transform="translate(30,30) scale(5)" filter="url(#soft)">
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="url(#pin)"/>
  </g>

  <!-- globe inside the pin head -->
  <g transform="translate(90,80)" stroke="#0f3d56" stroke-width="1.6" fill="none">
    <circle r="13.5" fill="#0b2233"/>
    <circle r="13.5" stroke="#5eead4"/>
    <ellipse rx="6" ry="13.5" stroke="#5eead4"/>
    <line x1="-13.5" y1="0" x2="13.5" y2="0" stroke="#5eead4"/>
    <line x1="-12" y1="-6.5" x2="12" y2="-6.5" stroke="#5eead4"/>
    <line x1="-12" y1="6.5" x2="12" y2="6.5" stroke="#5eead4"/>
  </g>

  <!-- wordmark -->
  <text x="172" y="98" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-1">
    <tspan fill="#f8fafc">mcp</tspan><tspan fill="#5eead4">-locator</tspan>
  </text>

  <!-- tagline -->
  <text x="174" y="134" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#94a3b8">
    Locale JSON translations, straight from your AI agent
  </text>

  <!-- MCP pill -->
  <g transform="translate(622,28)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#5eead4" fill-opacity="0.14" stroke="#5eead4" stroke-opacity="0.5"/>
    <text x="55" y="20" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#99f6e4">MCP server</text>
  </g>
</svg>
